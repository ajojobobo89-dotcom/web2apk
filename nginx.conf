server {
    listen 80;
    server_name apk.lifx.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name apk.lifx.com;

    root /var/www/lifx-web2apk;
    index index.html;

    ssl_certificate /etc/nginx/ssl/lifx.crt;
    ssl_certificate_key /etc/nginx/ssl/lifx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        rewrite ^/api/(.*)$ /api/$1.php last;
    }

    location /download {
        rewrite ^/download/(.*)$ /download.php?id=$1 last;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /builds {
        internal;
        alias /var/www/lifx-web2apk/builds;
    }

    location /output {
        internal;
        alias /var/www/lifx-web2apk/output;
    }
}
